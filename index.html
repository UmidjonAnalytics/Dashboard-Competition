<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umidjon Analytics - Dashboard Musobaqasi</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .star-active { background-color: #3b82f6 !important; color: white !important; }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen">

    <header class="p-6 text-center glass sticky top-0 z-50">
        <h1 id="main-title" class="text-xl font-black bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent uppercase">Dashboard Musobaqasi 2026</h1>
        <div id="back-btn" onclick="showHome()" class="hidden absolute left-4 top-7 text-blue-400 font-bold cursor-pointer">← Orqaga</div>
    </header>

    <main class="p-4 max-w-2xl mx-auto">
        <div id="home-view" class="space-y-6">
            <div class="grid grid-cols-2 gap-4 mt-4">
                <button onclick="showGallery('Excel')" class="bg-gradient-to-br from-green-600 to-green-800 p-8 rounded-3xl shadow-xl text-center">📊 EXCEL</button>
                <button onclick="showGallery('PowerBI')" class="bg-gradient-to-br from-yellow-500 to-yellow-700 p-8 rounded-3xl shadow-xl text-center">⚡ POWER BI</button>
            </div>

            <section id="admin-panel" class="hidden mt-10 p-6 rounded-2xl border-2 border-dashed border-blue-500/30 bg-blue-500/5 space-y-3">
                <h2 class="text-blue-400 font-bold">🛠 Admin: Dashboard Qo'shish</h2>
                <select id="new-category" class="w-full bg-slate-800 p-3 rounded-xl"><option value="Excel">Excel</option><option value="PowerBI">Power BI</option></select>
                <input type="text" id="new-id" placeholder="ID (masalan: #001)" class="w-full bg-slate-800 p-3 rounded-xl outline-none">
                <input type="url" id="new-pbi" placeholder="PBI Service Link" class="w-full bg-slate-800 p-3 rounded-xl outline-none">
                
                <div class="space-y-1">
                    <label class="text-[10px] text-slate-400 uppercase font-bold">1. Dashboard Rasmi (JPG/PNG):</label>
                    <input type="file" id="new-img" accept="image/*" class="w-full text-xs bg-slate-800 p-2 rounded-lg">
                </div>
                
                <div class="space-y-1">
                    <label class="text-[10px] text-slate-400 uppercase font-bold">2. Excel Fayl (.xlsx / .pbix):</label>
                    <input type="file" id="new-excel" class="w-full text-xs bg-slate-800 p-2 rounded-lg">
                </div>
                
                <button onclick="uploadEntry()" id="upload-btn" class="w-full bg-blue-600 py-3 rounded-xl font-bold">PUBLISH</button>
            </section>
        </div>

        <div id="gallery-view" class="hidden space-y-8 pb-20">
            <h2 id="category-title" class="text-2xl font-bold text-center text-blue-400"></h2>
            <div id="gallery-container" class="space-y-10"></div>
        </div>
    </main>

    <script>
        const ADMIN_ID = 8408175512; 
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwDLSwUk-26GP8cUjmMHx-7tqcCNQyYiojmZjugIn0DhT4zExlGg0JQkQVjGypFV8N5/exec'; 
        
        const tg = window.Telegram.WebApp;
        tg.expand();
        const userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : null;
        let allEntries = [];

        document.addEventListener('DOMContentLoaded', () => {
            if (userId === ADMIN_ID) document.getElementById('admin-panel').classList.remove('hidden');
            fetchData();
        });

        async function fetchData() {
            const res = await fetch(WEB_APP_URL);
            allEntries = await res.json();
        }

        function showHome() {
            document.getElementById('home-view').classList.remove('hidden');
            document.getElementById('gallery-view').classList.add('hidden');
            document.getElementById('back-btn').classList.add('hidden');
            fetchData();
        }

        function showGallery(cat) {
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('gallery-view').classList.remove('hidden');
            document.getElementById('back-btn').classList.remove('hidden');
            document.getElementById('category-title').innerText = cat + " Yo'nalishi";
            renderGallery(allEntries.filter(e => e.category === cat), cat);
        }

        function renderGallery(entries, cat) {
            const container = document.getElementById('gallery-container');
            container.innerHTML = entries.map(item => `
                <div class="bg-slate-800 rounded-3xl overflow-hidden border border-slate-700 shadow-2xl">
                    <img src="${item.fileUrl}" class="w-full h-auto border-b border-slate-700">
                    <div class="p-6 space-y-4">
                        <div class="flex justify-between items-center">
                            <span class="text-xl font-black text-blue-400">#${item.entryId}</span>
                            <div class="flex gap-2">
                                ${item.excelUrl ? `<a href="${item.excelUrl}" target="_blank" class="bg-green-600/20 text-green-400 px-3 py-1 rounded-full text-[10px] font-bold">FILE 📥</a>` : ''}
                                ${item.pbiLink ? `<a href="${item.pbiLink}" target="_blank" class="bg-blue-600/20 text-blue-400 px-3 py-1 rounded-full text-[10px] font-bold">WEB ↗</a>` : ''}
                            </div>
                        </div>
                        <div class="space-y-4">
                            ${['q1','q2','q3'].map(q => `<div class="space-y-1"><p class="text-[11px] text-slate-300">Savol ${q.at(-1)}...</p>${renderStars(item.entryId, q)}</div>`).join('')}
                            ${cat === 'PowerBI' ? `<div class="space-y-1"><p class="text-[11px] text-slate-300">DAX darajasi...</p>${renderStars(item.entryId, 'q4')}</div>` : ''}
                        </div>
                        <button onclick="submitDetailedVote('${item.entryId}', '${cat}')" class="w-full bg-blue-600 py-3 rounded-xl font-bold">OVOZ BERISH</button>
                    </div>
                </div>`).join('');
        }

        function renderStars(entryId, qKey) {
            let s = `<div class="flex flex-wrap gap-1" id="stars-${entryId}-${qKey}">`;
            for (let i = 1; i <= 10; i++) s += `<button onclick="selectStar('${entryId}','${qKey}',${i})" class="w-7 h-7 rounded bg-slate-700 text-[10px] font-bold border border-slate-600">${i}</button>`;
            return s + `</div><input type="hidden" id="val-${entryId}-${qKey}" value="0">`;
        }

        function selectStar(eId, qK, v) {
            const btns = document.getElementById(`stars-${eId}-${qK}`).getElementsByTagName('button');
            for (let b of btns) { b.classList.remove('star-active'); if (parseInt(b.innerText) === v) b.classList.add('star-active'); }
            document.getElementById(`val-${eId}-${qK}`).value = v;
        }

        async function uploadEntry() {
            const btn = document.getElementById('upload-btn');
            const imgFile = document.getElementById('new-img').files[0];
            const excelFile = document.getElementById('new-excel').files[0];
            if (!imgFile || !document.getElementById('new-id').value) return alert("ID va Rasmni kiriting!");

            btn.innerText = "YUKLANMOQDA...";
            btn.disabled = true;

            const reader = new FileReader();
            reader.readAsDataURL(imgFile);
            reader.onload = async () => {
                const payload = {
                    action: 'upload',
                    category: document.getElementById('new-category').value,
                    entryId: document.getElementById('new-id').value,
                    pbiLink: document.getElementById('new-pbi').value,
                    file: reader.result,
                    fileType: imgFile.type,
                    fileName: imgFile.name
                };

                if (excelFile) {
                    const exReader = new FileReader();
                    exReader.readAsDataURL(excelFile);
                    exReader.onload = async () => {
                        payload.excelFile = exReader.result;
                        payload.excelFileType = excelFile.type;
                        payload.excelFileName = excelFile.name;
                        await sendToGoogle(payload);
                    };
                } else {
                    await sendToGoogle(payload);
                }
            };
        }

        async function sendToGoogle(payload) {
            await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
            alert("Muvaffaqiyatli!");
            location.reload();
        }

        async function submitDetailedVote(id, cat) {
            const q1 = document.getElementById(`val-${id}-q1`).value;
            const q2 = document.getElementById(`val-${id}-q2`).value;
            const q3 = document.getElementById(`val-${id}-q3`).value;
            const q4 = cat === 'PowerBI' ? document.getElementById(`val-${id}-q4`).value : 0;
            if (q1==0 || q2==0 || q3==0) return tg.showAlert("Hamma savollarni belgilang!");

            const res = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'vote', voterId: userId, entryId: id, q1, q2, q3, q4, category: cat }) });
            const result = await res.json();
            tg.showAlert(result.status === 'duplicate' ? "Siz allaqachon ovoz bergansiz!" : "Rahmat!");
            showHome();
        }
    </script>
</body>
</html>
