<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umidjon Analytics - Dashboard Musobaqasi</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .star-rating { display: flex; flex-wrap: nowrap; gap: 4px; }
        .star { font-size: 24px; cursor: pointer; color: #334155; transition: 0.2s; line-height: 1; }
        .star.active { color: #fbbf24; text-shadow: 0 0 10px rgba(251, 191, 36, 0.4); }
        .diamond-shape { clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 min-h-screen">

    <nav class="p-4 glass sticky top-0 z-50 flex justify-between items-center px-6 lg:px-20">
        <h1 class="text-xl font-black bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent uppercase cursor-pointer" onclick="showHome()">Umidjon Analytics</h1>
        <div id="user-display" class="text-[10px] bg-slate-800 px-4 py-1.5 rounded-full border border-slate-700 font-mono text-blue-400">Guest Mode</div>
    </nav>

    <main class="p-6 max-w-7xl mx-auto">
        <div id="home-view" class="space-y-12 py-10">
            <div class="text-center space-y-4">
                <h2 class="text-5xl font-black text-white">Dashboard Challenge <span class="text-blue-500">2026</span></h2>
                <div class="flex justify-center gap-6 pt-10">
                    <button onclick="showGallery('Excel')" class="w-64 bg-green-600/20 border border-green-500/30 p-12 rounded-[3rem] hover:scale-105 transition">
                        <div class="text-5xl mb-4">📊</div>
                        <div class="font-bold text-xl text-green-400">EXCEL</div>
                    </button>
                    <button onclick="showGallery('PowerBI')" class="w-64 bg-yellow-500/10 border border-yellow-500/20 p-12 rounded-[3rem] hover:scale-105 transition">
                        <div class="text-5xl mb-4">⚡</div>
                        <div class="font-bold text-xl text-yellow-500">POWER BI</div>
                    </button>
                </div>
            </div>

            <section id="admin-panel" class="hidden max-w-2xl mx-auto p-10 rounded-[3rem] border-2 border-dashed border-blue-500/20 bg-blue-500/5 space-y-4">
                <h3 class="text-blue-400 font-bold uppercase tracking-widest text-sm">🛠 Admin: Dashboard Qo'shish</h3>
                <div class="grid grid-cols-2 gap-4">
                    <select id="new-cat" class="bg-slate-900 p-3 rounded-2xl border border-slate-700 outline-none text-sm"><option value="Excel">Excel</option><option value="PowerBI">Power BI</option></select>
                    <input type="text" id="new-eid" placeholder="Entry ID (ex: #001)" class="bg-slate-900 p-3 rounded-2xl border border-slate-700 outline-none text-sm">
                </div>
                <input type="text" id="new-title" placeholder="Loyiha nomi (Dashboard Title)" class="w-full bg-slate-900 p-3 rounded-2xl border border-slate-700 outline-none">
                <textarea id="new-desc" placeholder="Loyiha tavsifi (Description)" class="w-full bg-slate-900 p-3 rounded-2xl border border-slate-700 outline-none h-24"></textarea>
                <input type="url" id="new-pbi" placeholder="Power BI Service Link" class="w-full bg-slate-900 p-3 rounded-2xl border border-slate-700 outline-none text-sm">
                <div class="grid grid-cols-2 gap-4">
                    <input type="file" id="new-img" accept="image/*" class="text-xs bg-slate-900 p-3 rounded-2xl border border-slate-700">
                    <button onclick="uploadEntry()" id="up-btn" class="bg-blue-600 py-3 rounded-2xl font-black">PUBLISH</button>
                </div>
            </section>
        </div>

        <div id="gallery-view" class="hidden space-y-16 pb-32">
            <button onclick="showHome()" class="bg-slate-800 px-6 py-2 rounded-xl text-sm font-bold">← Orqaga</button>
            <div id="gallery-container" class="space-y-24"></div>
        </div>
    </main>

    <script>
        const ADMIN_ID = 8408175512; 
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwRKmpDIG_DNqC2-lQWW6IfuCTHVPEBUGkz3YFIsLCQcxqPFoxT5jB0_RVWngwqG7_Y/exec'; 
        
        const tg = window.Telegram.WebApp;
        tg.expand();
        let userId = (tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : new URLSearchParams(window.location.search).get('id'));
        let allEntries = [];

        document.addEventListener('DOMContentLoaded', () => {
            if(userId) document.getElementById('user-display').innerText = `ID: ${userId}`;
            if(parseInt(userId) === ADMIN_ID) document.getElementById('admin-panel').classList.remove('hidden');
            fetchData();
        });

        async function fetchData() {
            try {
                const res = await fetch(WEB_APP_URL);
                allEntries = await res.json();
            } catch (e) { console.error("API error"); }
        }

        function showHome() {
            document.getElementById('home-view').classList.remove('hidden');
            document.getElementById('gallery-view').classList.add('hidden');
        }

        function showGallery(cat) {
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('gallery-view').classList.remove('hidden');
            const filtered = allEntries.filter(e => e.category === cat);
            const container = document.getElementById('gallery-container');
            
            container.innerHTML = filtered.map(item => `
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-12 bg-slate-900/30 p-8 rounded-[3rem] border border-slate-800">
                    <div class="lg:col-span-2 space-y-4">
                        <img src="${item.fileUrl}" class="w-full h-auto rounded-[2rem] shadow-2xl border border-slate-700">
                        <div class="flex gap-4">
                            <div class="w-20 h-20 bg-slate-800 rounded-xl border border-slate-700 flex items-center justify-center text-xs opacity-50 italic">Extra Image</div>
                            <div class="w-20 h-20 bg-slate-800 rounded-xl border border-slate-700 flex items-center justify-center text-xs opacity-50 italic">Extra Image</div>
                            <button class="w-12 h-12 bg-blue-600/20 text-blue-400 rounded-full flex items-center justify-center diamond-shape border border-blue-500/40 ml-auto mt-4" title="Download File">📥</button>
                        </div>
                    </div>

                    <div class="space-y-8">
                        <div>
                            <div class="inline-block bg-blue-600 text-[10px] font-black px-3 py-1 rounded-full mb-2 uppercase tracking-widest">${item.entryId}</div>
                            <h3 class="text-3xl font-black text-white italic leading-tight">${item.title}</h3>
                            <div class="flex items-center gap-2 mt-4 text-yellow-500">
                                <span class="text-lg">★★★★★★☆☆☆☆</span>
                                <span class="text-xs text-slate-500 font-bold">6.0/10</span>
                            </div>
                        </div>

                        <div class="bg-slate-800/50 p-6 rounded-3xl border border-slate-700/50">
                            <h4 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Description</h4>
                            <p class="text-sm text-slate-300 leading-relaxed">${item.description || 'Tavsif berilmagan.'}</p>
                        </div>

                        <div class="space-y-6">
                            ${qBox(item.entryId, 'q1', "Dizayn (chart, rang, shakl)")}
                            ${qBox(item.entryId, 'q2', "Tushunarlilik (insightlar)")}
                            ${qBox(item.entryId, 'q3', "Biznes uchun ahamiyati")}
                        </div>

                        <div class="space-y-2">
                            <h4 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-2">Viewer's Advice</h4>
                            <textarea id="advice-${item.entryId}" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-3xl outline-none text-sm h-24 focus:border-blue-500 transition" placeholder="O'z fikringiz yoki maslahatingizni yozing..."></textarea>
                        </div>

                        <button onclick="submitVote('${item.entryId}', '${cat}')" class="w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-[2rem] font-black text-lg transition-all shadow-xl shadow-blue-600/20">TASDIQLASH</button>
                    </div>
                </div>`).join('');
        }

        function qBox(id, qk, txt) {
            let stars = `<div class="star-rating" id="stars-${id}-${qk}">`;
            for(let i=1; i<=10; i++) stars += `<span class="star" onclick="setS('${id}','${qk}',${i})">★</span>`;
            return `<div class="space-y-1"><p class="text-[10px] text-slate-500 font-bold uppercase ml-1 tracking-wider">${txt}</p>${stars}</div><input type="hidden" id="val-${id}-${qk}" value="0">`;
        }

        function setS(id, qk, v) {
            const container = document.getElementById(`stars-${id}-${qk}`);
            const stars = container.getElementsByClassName('star');
            document.getElementById(`val-${id}-${qk}`).value = v;
            for(let i=0; i<10; i++) stars[i].classList.toggle('active', i < v);
        }

        async function uploadEntry() {
            const btn = document.getElementById('up-btn');
            const img = document.getElementById('new-img').files[0];
            const eid = document.getElementById('new-eid').value;
            const title = document.getElementById('new-title').value;
            const desc = document.getElementById('new-desc').value;
            if(!img || !eid || !title) return alert("Majburiy maydonlarni to'ldiring!");

            btn.innerText = "⏳ PUBLISHING..."; btn.disabled = true;
            const reader = new FileReader();
            reader.readAsDataURL(img);
            reader.onload = async () => {
                const payload = {
                    action: 'upload', category: document.getElementById('new-cat').value, entryId: eid, 
                    title: title, description: desc, pbiLink: document.getElementById('new-pbi').value, 
                    file: reader.result, fileType: img.type, fileName: img.name
                };
                await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
                location.reload();
            };
        }

        async function submitVote(id, cat) {
            if(!userId) return alert("Iltimos, bot orqali kiring!");
            const q1=document.getElementById(`val-${id}-q1`).value, q2=document.getElementById(`val-${id}-q2`).value, q3=document.getElementById(`val-${id}-q3`).value;
            const advice = document.getElementById(`advice-${id}`).value;
            if(q1==0||q2==0||q3==0) return alert("Barcha savollarni baholang!");

            const res = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({action:'vote', voterId:userId, entryId:id, q1, q2, q3, q4:0, advice:advice, category:cat}) });
            const result = await res.json();
            alert(result.status === 'duplicate' ? "Siz bu yo'nalishda ovoz bergansiz!" : "Rahmat! Ovozingiz qabul qilindi.");
            showHome();
        }
    </script>
</body>
</html>
