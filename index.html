<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umidjon Analytics</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .star-rating { display: flex; flex-wrap: nowrap; gap: 4px; }
        .star { font-size: 26px; color: #334155; transition: 0.2s; line-height: 1; }
        .star.active { color: #fbbf24; text-shadow: 0 0 12px rgba(251, 191, 36, 0.5); transform: scale(1.1); }
        .diamond-shape { clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); }
        html { scroll-behavior: smooth; }
        .custom-scroll::-webkit-scrollbar { height: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 min-h-screen">

    <nav class="p-4 glass sticky top-0 z-50 flex justify-between items-center px-6 lg:px-20">
        <h1 class="text-xl font-black bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent uppercase cursor-pointer" onclick="showHome()">Umidjon Analytics</h1>
        <div id="user-display" class="text-[10px] bg-slate-800 px-4 py-1.5 rounded-full border border-slate-700 font-mono text-blue-400">Guest Mode</div>
    </nav>

    <main class="p-4 md:p-6 max-w-7xl mx-auto w-full">
        <div id="home-view" class="space-y-12 py-10">
            <div class="text-center space-y-4">
                <h2 class="text-4xl md:text-5xl font-black text-white">Dashboard Challenge <span class="text-blue-500">2026</span></h2>
                <p id="loading-indicator" class="text-blue-400 font-bold animate-pulse tracking-widest text-sm pt-4">Ma'lumotlar serverga ulanmoqda... ⏳</p>
                <div class="flex flex-wrap justify-center gap-6 pt-6">
                    <button onclick="showGallery('Excel')" class="w-full md:w-64 bg-green-600/10 border border-green-500/20 p-10 rounded-[3rem] hover:scale-105 transition">
                        <div class="text-5xl mb-4">📊</div><div class="font-bold text-xl text-green-400">EXCEL</div>
                    </button>
                    <button onclick="showGallery('PowerBI')" class="w-full md:w-64 bg-yellow-500/10 border border-yellow-500/20 p-10 rounded-[3rem] hover:scale-105 transition">
                        <div class="text-5xl mb-4">⚡</div><div class="font-bold text-xl text-yellow-500">POWER BI</div>
                    </button>
                </div>
            </div>

            <section id="admin-panel" class="hidden max-w-2xl mx-auto p-8 rounded-[3rem] border-2 border-dashed border-blue-500/20 bg-blue-500/5 space-y-4">
                <h3 class="text-blue-400 font-bold uppercase tracking-widest text-sm">🛠 Admin Upload</h3>
                <div class="grid grid-cols-2 gap-4">
                    <select id="new-cat" class="bg-slate-900 p-3 rounded-2xl border border-slate-700 outline-none text-sm"><option value="Excel">Excel</option><option value="PowerBI">Power BI</option></select>
                    <input type="text" id="new-eid" placeholder="ID (ex: 001)" class="bg-slate-900 p-3 rounded-2xl border border-slate-700 outline-none text-sm">
                </div>
                <input type="text" id="new-title" placeholder="Loyiha nomi / Talaba Ismi" class="w-full bg-slate-900 p-3 rounded-2xl border border-slate-700 outline-none">
                <textarea id="new-desc" placeholder="Loyiha tavsifi..." class="w-full bg-slate-900 p-3 rounded-2xl border border-slate-700 outline-none h-20"></textarea>
                <input type="url" id="new-pbi" placeholder="Power BI Link (ixtiyoriy)" class="w-full bg-slate-900 p-3 rounded-2xl border border-slate-700 outline-none text-sm">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1"><label class="text-[10px] text-slate-500">MAIN PHOTO*</label><input type="file" id="new-img" accept="image/*" class="text-xs bg-slate-900 p-2 rounded-2xl w-full border border-slate-700"></div>
                    <div class="space-y-1"><label class="text-[10px] text-slate-500">EXCEL FILE</label><input type="file" id="new-excel" class="text-xs bg-slate-900 p-2 rounded-2xl w-full border border-slate-700"></div>
                </div>
                <div class="grid grid-cols-2 lg:grid-cols-4 gap-2">
                    <input type="file" id="new-ex1" accept="image/*" class="text-[10px] bg-slate-900 p-2 rounded-xl w-full">
                    <input type="file" id="new-ex2" accept="image/*" class="text-[10px] bg-slate-900 p-2 rounded-xl w-full">
                    <input type="file" id="new-ex3" accept="image/*" class="text-[10px] bg-slate-900 p-2 rounded-xl w-full">
                    <input type="file" id="new-ex4" accept="image/*" class="text-[10px] bg-slate-900 p-2 rounded-xl w-full">
                </div>
                <button onclick="uploadEntry()" id="up-btn" class="w-full bg-blue-600 py-4 rounded-2xl font-black shadow-lg hover:bg-blue-500 mt-4">🚀 PUBLISH</button>
            </section>
        </div>

        <div id="gallery-view" class="hidden space-y-10 pb-32">
            <div class="flex justify-between items-center">
                <button onclick="showHome()" class="bg-slate-800 px-6 py-2 rounded-xl text-sm font-bold border border-slate-700">← Orqaga</button>
                <h2 id="category-title" class="text-2xl font-black text-white uppercase italic"></h2>
            </div>
            
            <div id="category-leaderboard" class="bg-slate-900/60 p-6 rounded-[2rem] border border-slate-800 shadow-xl overflow-x-auto custom-scroll">
                <h3 class="text-[10px] text-blue-400 font-bold tracking-[0.2em] uppercase mb-4 pl-2">🏆 TOP Reyting</h3>
                <div id="leaderboard-content" class="flex flex-col md:flex-row gap-4 min-w-max pb-2"></div>
            </div>

            <div id="gallery-container" class="space-y-24"></div>
        </div>
    </main>

    <script>
        const ADMIN_ID = 8408175512; 
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwsk6tu8cMnOdLzwjZF0g4S_2D20v0Zk4s1PqEHmsllS5P8m0wEIGXYbd_2hLUFQkGe/exec'; // 👈 YANGI URL SHU YERGA
        
        const tg = window.Telegram.WebApp;
        tg.expand();
        let userId = (tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : new URLSearchParams(window.location.search).get('id'));
        let allEntries = [];
        let leaderboardData = [];
        let myVotes = []; // Mening ovozlarim
        let isDataLoaded = false;

        document.addEventListener('DOMContentLoaded', () => {
            if(userId) document.getElementById('user-display').innerText = `ID: ${userId}`;
            if(parseInt(userId) === ADMIN_ID) document.getElementById('admin-panel').classList.remove('hidden');
            fetchData();
        });

        async function fetchData() {
            try {
                // Backendga user id ni ham yuboramiz
                const urlWithParams = userId ? `${WEB_APP_URL}?userId=${userId}` : WEB_APP_URL;
                const res = await fetch(urlWithParams);
                const data = await res.json();
                
                allEntries = data.entries || [];
                leaderboardData = data.leaderboard || [];
                myVotes = data.userVotes || []; // Mening ovozlarimni yuklash
                
                isDataLoaded = true;
                document.getElementById('loading-indicator').innerText = "Tizim tayyor! Yo'nalishni tanlang 👇";
                document.getElementById('loading-indicator').classList.remove('animate-pulse');
                document.getElementById('loading-indicator').classList.add('text-emerald-400');
            } catch (e) { 
                document.getElementById('loading-indicator').innerText = "Ma'lumot yuklashda xato yuz berdi :(";
            }
        }

        function showHome() {
            document.getElementById('home-view').classList.remove('hidden');
            document.getElementById('gallery-view').classList.add('hidden');
        }

        function shuffleArray(array) {
            let curId = array.length;
            while (0 !== curId) {
                let randId = Math.floor(Math.random() * curId);
                curId -= 1;
                let tmp = array[curId];
                array[curId] = array[randId];
                array[randId] = tmp;
            }
            return array;
        }

        function getStarsHtml(score) {
            let stars = '';
            for(let i=1; i<=10; i++) {
                stars += `<span style="color: ${i <= Math.round(score) ? '#fbbf24' : '#334155'}; text-shadow: ${i <= Math.round(score) ? '0 0 5px rgba(251,191,36,0.5)' : 'none'}">★</span>`;
            }
            return stars;
        }

        // TASHQI LINKLARNI OCHISH UCHUN XAVFSIZ FUNKSIYA (Fayl tortish va Rasm kattalashtirish)
        function openExternalLink(url) {
            if (!url) return;
            // Agar Telegram WebApp ichida bo'lsa, maxsus openLink funksiyasidan foydalanamiz
            if (window.Telegram && window.Telegram.WebApp && tg.initDataUnsafe.user) {
                tg.openLink(url);
            } else {
                window.open(url, '_blank');
            }
        }

        function showGallery(cat) {
            if(!isDataLoaded) return alert("Iltimos, ma'lumotlar yuklanishini kuting!");
            
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('gallery-view').classList.remove('hidden');
            document.getElementById('category-title').innerText = cat;
            
            let filtered = allEntries.filter(e => e.category === cat);
            
            // 3. OVOZ BERILGANLARNI AJRATISH VA OXRIGA O'TKAZISH
            const scoredIds = myVotes.filter(v => v.category === cat).map(v => String(v.entryId));
            let unscored = filtered.filter(item => !scoredIds.includes(String(item.entryid)));
            let scored = filtered.filter(item => scoredIds.includes(String(item.entryid)));
            
            unscored = shuffleArray(unscored); // Yangilari aralash chiqadi
            scored = shuffleArray(scored); // Eskilari ham aralash chiqadi
            
            const finalList = [...unscored, ...scored]; // Yangilar oldin, baholanganlar keyin
            
            renderLeaderboard(cat);
            renderGallery(finalList, cat);
        }

        function renderLeaderboard(cat) {
            const container = document.getElementById('leaderboard-content');
            const catEntryIds = allEntries.filter(e => e.category === cat).map(e => String(e.entryid));
            const catLeaderboard = leaderboardData
                .filter(l => catEntryIds.includes(String(l.id)))
                .sort((a,b) => b.avg - a.avg);

            container.innerHTML = catLeaderboard.map((s, index) => {
                const entryData = allEntries.find(e => String(e.entryid) === String(s.id));
                const img = entryData ? entryData.fileurl : '';
                const qScores = cat === 'PowerBI' ? `(${s.q1}, ${s.q2}, ${s.q3}, ${s.q4})` : `(${s.q1}, ${s.q2}, ${s.q3})`;

                return `
                <div onclick="document.getElementById('dash-${s.id}').scrollIntoView({behavior: 'smooth', block: 'start'})" 
                     class="flex items-center gap-4 bg-slate-800 hover:bg-slate-700 transition px-5 py-3 rounded-2xl border border-slate-700 cursor-pointer min-w-[320px] max-w-md">
                    <span class="text-xl text-blue-400 font-black">#${index+1}</span>
                    <img src="${img}" class="w-16 h-12 object-cover rounded-lg border border-slate-600 bg-slate-900" loading="lazy">
                    <div class="flex-1 min-w-0">
                        <div class="text-sm font-bold text-white truncate">${s.id} - ${s.title}</div>
                        <div class="flex items-center gap-1 mt-0.5 text-sm tracking-widest">${getStarsHtml(s.avg)}</div>
                        <div class="text-[10px] text-slate-400 font-mono mt-0.5">${s.avg}/10 &nbsp; ${qScores}</div>
                    </div>
                </div>`;
            }).join('') || '<p class="text-slate-500 text-xs italic">Natijalar tez kunda...</p>';
        }

        function renderGallery(entries, cat) {
            const container = document.getElementById('gallery-container');
            container.innerHTML = entries.length ? '' : '<p class="text-center text-slate-500 py-10">Hozircha dashbordlar yo\'q.</p>';
            
            entries.forEach(item => {
                const scoreObj = leaderboardData.find(l => String(l.id) === String(item.entryid));
                const avgScore = scoreObj ? parseFloat(scoreObj.avg) : 0;
                
                // Men bu dashboardga ovoz berganmanmi?
                const myVote = myVotes.find(v => String(v.entryId) === String(item.entryid));
                const isVoted = !!myVote;

                let dlLink = item.excelurl;
                if(dlLink && dlLink.includes('file/d/')) {
                    const fileId = dlLink.split('file/d/')[1].split('/')[0];
                    dlLink = `https://drive.google.com/uc?export=download&id=${fileId}`;
                }

                container.innerHTML += `
                <div id="dash-${item.entryid}" class="grid grid-cols-1 xl:grid-cols-12 gap-8 bg-slate-900/40 p-6 md:p-10 rounded-[3rem] border border-slate-800 shadow-2xl relative ${isVoted ? 'border-emerald-500/50 bg-emerald-900/10' : ''}">
                    
                    <div class="xl:col-span-6 space-y-6 min-w-0 flex flex-col">
                        <img src="${item.fileurl}" class="w-full h-auto rounded-[2rem] shadow-lg border border-slate-700 bg-slate-800 object-contain max-h-[500px] cursor-zoom-in hover:scale-[1.01] transition" alt="Main" loading="lazy" onclick="openExternalLink(this.src)">
                        
                        <div class="flex flex-wrap gap-3 items-center">
                            ${item.extra1 ? `<img src="${item.extra1}" class="w-16 h-16 md:w-20 md:h-20 object-cover rounded-2xl border border-slate-700 cursor-zoom-in hover:scale-105 transition" onclick="openExternalLink(this.src)">` : ''}
                            ${item.extra2 ? `<img src="${item.extra2}" class="w-16 h-16 md:w-20 md:h-20 object-cover rounded-2xl border border-slate-700 cursor-zoom-in hover:scale-105 transition" onclick="openExternalLink(this.src)">` : ''}
                            ${item.extra3 ? `<img src="${item.extra3}" class="w-16 h-16 md:w-20 md:h-20 object-cover rounded-2xl border border-slate-700 cursor-zoom-in hover:scale-105 transition" onclick="openExternalLink(this.src)">` : ''}
                            ${item.extra4 ? `<img src="${item.extra4}" class="w-16 h-16 md:w-20 md:h-20 object-cover rounded-2xl border border-slate-700 cursor-zoom-in hover:scale-105 transition" onclick="openExternalLink(this.src)">` : ''}
                            ${dlLink ? `<button onclick="openExternalLink('${dlLink}')" class="w-12 h-12 md:w-14 md:h-14 bg-emerald-600/20 text-emerald-400 flex items-center justify-center diamond-shape border border-emerald-500/40 ml-auto transition hover:scale-110" title="Faylni tortish">📥</button>` : ''}
                        </div>

                        <div class="mt-4 border-t border-slate-800 pt-6">
                            <div class="inline-block ${isVoted ? 'bg-emerald-600' : 'bg-blue-600'} text-[10px] font-black px-3 py-1 rounded-full mb-2 uppercase tracking-widest">${item.entryid}</div>
                            <h3 class="text-3xl font-black text-white italic leading-tight break-words">${item.title || 'Nomsiz Dashboard'}</h3>
                            <div class="flex items-center gap-2 mt-3 text-2xl tracking-widest flex-wrap">
                                ${getStarsHtml(avgScore)} <span class="text-xs text-slate-400 font-bold ml-2 font-mono whitespace-nowrap">${avgScore.toFixed(1)}/10 O'rtacha</span>
                            </div>
                        </div>

                        <div class="bg-slate-800/40 p-6 rounded-3xl border border-slate-700/50 mt-4 grow">
                            <h4 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">DESCRIPTION</h4>
                            <p class="text-sm text-slate-300 leading-relaxed break-words whitespace-pre-wrap">${item.description || 'Tavsif yo\'q.'}</p>
                        </div>
                    </div>

                    <div class="xl:col-span-6 space-y-6 min-w-0 flex flex-col justify-center bg-slate-800/20 p-6 md:p-8 rounded-[2rem] border border-slate-700/50">
                        <h4 class="text-sm font-bold ${isVoted ? 'text-emerald-400' : 'text-blue-400'} uppercase tracking-widest mb-2 border-b border-slate-700 pb-3">
                            ${isVoted ? '✅ SIZNING OVOZINGIZ' : 'Ovoz Berish Paneli'}
                        </h4>
                        
                        <div class="space-y-5">
                            ${qBox(item.entryid, 'q1', "Dizayn (chart, rang, shakl)", myVote ? myVote.q1 : 0, isVoted)}
                            ${qBox(item.entryid, 'q2', "Tushunarlilik (insightlar)", myVote ? myVote.q2 : 0, isVoted)}
                            ${qBox(item.entryid, 'q3', "Biznes uchun ahamiyati", myVote ? myVote.q3 : 0, isVoted)}
                            ${cat === 'PowerBI' ? qBox(item.entryid, 'q4', "DAX dan qo'llanish darajasi (ochmasangiz 10)", myVote ? myVote.q4 : 0, isVoted) : ''}
                        </div>

                        <div class="space-y-2 mt-6">
                            <h4 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-2">Viewer's Advice</h4>
                            <textarea id="advice-${item.entryid}" class="w-full ${isVoted ? 'bg-slate-800/40 text-slate-400' : 'bg-slate-900 text-slate-200'} border border-slate-700 p-4 rounded-3xl outline-none text-sm h-24 focus:border-blue-500 transition resize-none" placeholder="O'z maslahatingizni yozing..." ${isVoted ? 'readonly' : ''}>${myVote ? (myVote.advice || '') : ''}</textarea>
                        </div>

                        ${!isVoted ? 
                            `<button onclick="submitVote('${item.entryid}', '${cat}')" class="w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-[2rem] font-black text-lg transition-all shadow-xl shadow-blue-600/20 mt-4">TASDIQLASH VA OVOZ BERISH</button>` 
                            : 
                            `<div class="w-full bg-emerald-600/20 text-emerald-500 py-5 rounded-[2rem] font-black text-center text-lg mt-4 border border-emerald-500/30 cursor-not-allowed">OVOZ BERINGAN</div>`
                        }
                    </div>
                </div>`;
            });
        }

        // QUTINI CHIZISH (Agar oldin ovoz berilgan bo'lsa, click ishlamaydi va saqlangan baho yonadi)
        function qBox(id, qk, txt, myVal, isVoted) {
            let stars = `<div class="star-rating" id="stars-${id}-${qk}">`;
            for(let i=1; i<=10; i++) {
                const activeClass = i <= myVal ? 'active' : '';
                const onClick = isVoted ? '' : `onclick="setS('${id}','${qk}',${i})"`;
                const cursor = isVoted ? 'cursor-default' : 'cursor-pointer';
                stars += `<span class="star ${activeClass} ${cursor}" ${onClick}>★</span>`;
            }
            stars += `</div><input type="hidden" id="val-${id}-${qk}" value="${myVal}">`;
            return `<div class="space-y-2"><p class="text-[10px] text-slate-400 font-bold uppercase ml-1 tracking-wider break-words">${txt}</p>${stars}</div>`;
        }

        function setS(id, qk, v) {
            const stars = document.getElementById(`stars-${id}-${qk}`).getElementsByClassName('star');
            document.getElementById(`val-${id}-${qk}`).value = v;
            for(let i=0; i<10; i++) stars[i].classList.toggle('active', i < v);
        }

        const readFile = (file) => new Promise(res => {
            if(!file) return res(null);
            const r = new FileReader();
            r.onload = () => res({ data: r.result, type: file.type, name: file.name });
            r.readAsDataURL(file);
        });

        async function uploadEntry() {
            const btn = document.getElementById('up-btn');
            const fileEl = document.getElementById('new-img').files[0];
            const eid = document.getElementById('new-eid').value;
            const title = document.getElementById('new-title').value;

            if(!fileEl || !eid || !title) return alert("Majburiy: ID, Nomi va Asosiy Rasm!");

            btn.innerText = "⏳ YUKLANMOQDA..."; btn.disabled = true;
            try {
                const payload = {
                    action: 'upload', category: document.getElementById('new-cat').value, entryId: eid, 
                    title: title, description: document.getElementById('new-desc').value, pbiLink: document.getElementById('new-pbi').value, 
                };

                const mainImg = await readFile(fileEl); payload.file = mainImg.data; payload.fileType = mainImg.type; payload.fileName = mainImg.name;
                
                const ex1 = await readFile(document.getElementById('new-ex1').files[0]); if(ex1) { payload.ex1 = ex1.data; payload.ex1Type = ex1.type; payload.ex1Name = ex1.name; }
                const ex2 = await readFile(document.getElementById('new-ex2').files[0]); if(ex2) { payload.ex2 = ex2.data; payload.ex2Type = ex2.type; payload.ex2Name = ex2.name; }
                const ex3 = await readFile(document.getElementById('new-ex3').files[0]); if(ex3) { payload.ex3 = ex3.data; payload.ex3Type = ex3.type; payload.ex3Name = ex3.name; }
                const ex4 = await readFile(document.getElementById('new-ex4').files[0]); if(ex4) { payload.ex4 = ex4.data; payload.ex4Type = ex4.type; payload.ex4Name = ex4.name; }
                const excel = await readFile(document.getElementById('new-excel').files[0]); if(excel) { payload.excel = excel.data; payload.excelType = excel.type; payload.excelName = excel.name; }

                await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
                alert("Muvaffaqiyatli!"); location.reload();
            } catch (err) { alert("Xato!"); btn.innerText = "PUBLISH"; btn.disabled = false; }
        }

        async function submitVote(id, cat) {
            if(!userId) return alert("Iltimos, bot orqali kiring!");
            const q1=document.getElementById(`val-${id}-q1`).value, q2=document.getElementById(`val-${id}-q2`).value, q3=document.getElementById(`val-${id}-q3`).value, q4=cat==='PowerBI'?document.getElementById(`val-${id}-q4`).value:0;
            const advice = document.getElementById(`advice-${id}`).value;
            
            if(q1==0||q2==0||q3==0 || (cat==='PowerBI' && q4==0)) return alert("Barcha yulduzchalarga baho bering!");

            if(confirm(`ID #${id} ga bergan ovozingizni tasdiqlaysizmi?`)) {
                const res = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({action:'vote', voterId:userId, entryId:id, q1, q2, q3, q4, advice, category:cat}) });
                const result = await res.json();
                if (result.status === 'duplicate') {
                    alert("Siz ushbu dashboardga allaqachon ovoz bergansiz!");
                } else {
                    alert("Rahmat! Ovozingiz qabul qilindi.");
                    location.reload(); // Sahifani yangilaymiz, shunda yangi quticha yashil bo'lib pastga tushadi
                }
            }
        }
    </script>
</body>
</html>
