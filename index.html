<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umidjon Analytics</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .star-rating { display: flex; flex-direction: row; gap: 2px; }
        .star { font-size: 20px; cursor: pointer; color: #334155; transition: color 0.2s; }
        .star.active { color: #fbbf24; }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 min-h-screen pb-20">

    <nav class="p-5 glass sticky top-0 z-50 flex justify-between items-center px-8">
        <h1 class="text-xl font-black bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent uppercase cursor-pointer" onclick="showHome()">Umidjon Analytics</h1>
        <div id="user-id" class="text-[10px] bg-slate-800 px-3 py-1 rounded-full text-blue-400 border border-slate-700">Guest</div>
    </nav>

    <main class="p-4 max-w-4xl mx-auto">
        <div id="home-view" class="space-y-8">
            <div class="grid grid-cols-2 gap-4 pt-4">
                <button onclick="showGallery('Excel')" class="bg-gradient-to-br from-green-600 to-emerald-800 p-8 rounded-[2rem] font-bold text-xl">📊 EXCEL</button>
                <button onclick="showGallery('PowerBI')" class="bg-gradient-to-br from-yellow-500 to-orange-700 p-8 rounded-[2rem] font-bold text-xl text-slate-900">⚡ POWER BI</button>
            </div>

            <section id="admin-panel" class="hidden p-6 rounded-[2rem] border-2 border-dashed border-blue-500/20 bg-blue-500/5 space-y-4">
                <h3 class="text-blue-400 font-bold">🛠 Admin: Dashboard Qo'shish</h3>
                <div class="grid grid-cols-2 gap-2">
                    <select id="new-cat" class="bg-slate-900 p-3 rounded-xl border border-slate-700 outline-none"><option value="Excel">Excel</option><option value="PowerBI">Power BI</option></select>
                    <input type="text" id="new-eid" placeholder="ID (ex: #001)" class="bg-slate-900 p-3 rounded-xl border border-slate-700 outline-none text-sm">
                </div>
                <input type="text" id="new-title" placeholder="Loyiha nomi (Talaba ismi)" class="w-full bg-slate-900 p-3 rounded-xl border border-slate-700 outline-none text-sm">
                <input type="url" id="new-pbi" placeholder="PBI Link" class="w-full bg-slate-900 p-3 rounded-xl border border-slate-700 outline-none text-sm">
                <input type="file" id="new-img" accept="image/*" class="w-full text-xs bg-slate-900 p-3 rounded-xl border border-slate-700">
                <button onclick="uploadEntry()" id="up-btn" class="w-full bg-blue-600 py-3 rounded-xl font-bold">PUBLISH</button>
            </section>
        </div>

        <div id="gallery-view" class="hidden space-y-10">
            <button onclick="showHome()" class="text-blue-400 font-bold mb-4">← Orqaga</button>
            <div id="gallery-container" class="space-y-12"></div>
        </div>
    </main>

    <script>
        const ADMIN_ID = 8408175512; 
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzhCMIWMJK6UKk2YrggnZFJ1dDBfWS-3UFTnbaPqE_4mfKXBYsIE-dMKWuqa-RkqmmC/exec'; 
        
        const tg = window.Telegram.WebApp;
        tg.expand();
        let userId = (tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : new URLSearchParams(window.location.search).get('id'));
        let allEntries = [];

        document.addEventListener('DOMContentLoaded', () => {
            if(userId) document.getElementById('user-id').innerText = `ID: ${userId}`;
            if(parseInt(userId) === ADMIN_ID) document.getElementById('admin-panel').classList.remove('hidden');
            fetchData();
        });

        async function fetchData() {
            const res = await fetch(WEB_APP_URL);
            const data = await res.json();
            allEntries = data.entries;
        }

        function showHome() {
            document.getElementById('home-view').classList.remove('hidden');
            document.getElementById('gallery-view').classList.add('hidden');
        }

        function showGallery(cat) {
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('gallery-view').classList.remove('hidden');
            const filtered = allEntries.filter(e => e.category === cat);
            const container = document.getElementById('gallery-container');
            container.innerHTML = filtered.map(item => `
                <div class="bg-slate-900 rounded-[2.5rem] overflow-hidden border border-slate-800 shadow-2xl">
                    <img src="${item.fileUrl}" class="w-full h-auto border-b border-slate-800">
                    <div class="p-6 space-y-6">
                        <div class="flex justify-between items-center">
                            <span class="text-blue-400 font-black">#${item.entryId}</span>
                            ${item.pbiLink ? `<a href="${item.pbiLink}" target="_blank" class="text-[10px] bg-blue-500/10 text-blue-400 px-3 py-1 rounded-full font-bold">LIVE PBI ↗</a>` : ''}
                        </div>
                        <h3 class="text-xl font-bold text-white uppercase tracking-tight">${item.title}</h3>
                        <div class="space-y-6">
                            ${qBox(item.entryId, 'q1', "Dashboard dizayniga (chartlar, ranglar, shakllar, textlar) qanday baho berasiz?")}
                            ${qBox(item.entryId, 'q2', "Dashboard ortiqcha so'zlarsiz tushunarliligiga qanday baho berasiz?")}
                            ${qBox(item.entryId, 'q3', "Dashboarddagi ma'lumotlari biznes uchun qaror chiqarishga qanchalik muhim deb o'ylaysiz?")}
                            ${cat === 'PowerBI' ? qBox(item.entryId, 'q4', "Power BI DAX dan qo'llanish darajasini qanday baholaysiz?") : ''}
                        </div>
                        <button onclick="submitVote('${item.entryId}', '${cat}')" class="w-full bg-blue-600 py-4 rounded-2xl font-black">TASDIQLASH</button>
                    </div>
                </div>`).join('');
        }

        function qBox(id, qk, txt) {
            let stars = `<div class="star-rating" id="stars-${id}-${qk}">`;
            for(let i=1; i<=10; i++) stars += `<span class="star" onclick="setS('${id}','${qk}',${i})">★</span>`;
            return `<div class="space-y-1"><p class="text-[11px] text-slate-500 font-bold uppercase">${txt}</p>${stars}</div><input type="hidden" id="val-${id}-${qk}" value="0">`;
        }

        function setS(id, qk, v) {
            const container = document.getElementById(`stars-${id}-${qk}`);
            const stars = container.getElementsByClassName('star');
            document.getElementById(`val-${id}-${qk}`).value = v;
            for(let i=0; i<10; i++) stars[i].classList.toggle('active', i < v);
        }

        async function uploadEntry() {
            const btn = document.getElementById('up-btn');
            const img = document.getElementById('new-img').files[0];
            const eid = document.getElementById('new-eid').value;
            const title = document.getElementById('new-title').value;
            if(!img || !eid || !title) return alert("Hamma maydonlarni to'ldiring!");

            btn.innerText = "⏳ YUKLANMOQDA..."; btn.disabled = true;
            const reader = new FileReader();
            reader.readAsDataURL(img);
            reader.onload = async () => {
                const payload = {
                    action: 'upload', category: document.getElementById('new-cat').value, entryId: eid, title: title,
                    pbiLink: document.getElementById('new-pbi').value, file: reader.result, fileType: img.type, fileName: img.name
                };
                await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
                location.reload();
            };
        }

        async function submitVote(id, cat) {
            if(!userId) return alert("Faqat Telegram bot orqali ovoz berish mumkin!");
            const q1=document.getElementById(`val-${id}-q1`).value, q2=document.getElementById(`val-${id}-q2`).value, q3=document.getElementById(`val-${id}-q3`).value, q4=cat==='PowerBI'?document.getElementById(`val-${id}-q4`).value:0;
            if(q1==0||q2==0||q3==0) return alert("Barcha savollarni baholang!");

            const res = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({action:'vote', voterId:userId, entryId:id, q1, q2, q3, q4, category:cat}) });
            const result = await res.json();
            alert(result.status === 'duplicate' ? "Siz bu yo'nalishda ovoz bergansiz!" : "Rahmat!");
            showHome();
        }
    </script>
</body>
</html>
