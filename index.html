<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umidjon Analytics</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .star-rating { display: flex; flex-wrap: nowrap; gap: 4px; }
        .star { font-size: 26px; color: #334155; transition: 0.2s; line-height: 1; }
        .star.active { color: #fbbf24; text-shadow: 0 0 12px rgba(251, 191, 36, 0.5); transform: scale(1.1); }
        .diamond-shape { clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); }
        html { scroll-behavior: smooth; }
        .custom-scroll::-webkit-scrollbar { height: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        #lightbox { transition: opacity 0.3s ease; }
        #lightbox.hidden { opacity: 0; pointer-events: none; }
        #lightbox:not(.hidden) { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 min-h-screen">

    <nav class="p-4 glass sticky top-0 z-50 flex justify-between items-center px-6 lg:px-20">
        <h1 class="text-xl font-black bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent uppercase cursor-pointer" onclick="showHome()">Umidjon Analytics</h1>
        <div id="user-display" class="text-[10px] bg-slate-800 px-4 py-1.5 rounded-full border border-slate-700 font-mono text-blue-400">Guest Mode</div>
    </nav>

    <main class="p-4 md:p-6 max-w-7xl mx-auto w-full">
        <div id="home-view" class="space-y-12 py-10">
            <div class="text-center space-y-4">
                <h2 class="text-4xl md:text-5xl font-black text-white">Dashboard Challenge <span class="text-blue-500">2026</span></h2>
                <p id="loading-indicator" class="text-blue-400 font-bold animate-pulse tracking-widest text-sm pt-4">Ma'lumotlar serverga ulanmoqda... ⏳</p>
                <div id="deadline-timer" class="text-xs font-mono text-red-400 uppercase tracking-widest font-bold hidden">⏳ Ovoz berish 04.04.2026 soat 18:00 gacha</div>
                <div class="flex flex-wrap justify-center gap-6 pt-6">
                    <button onclick="showGallery('Excel')" class="w-full md:w-64 bg-green-600/10 border border-green-500/20 p-10 rounded-[3rem] hover:scale-105 transition">
                        <div class="text-5xl mb-4">📊</div><div class="font-bold text-xl text-green-400">EXCEL</div>
                    </button>
                    <button onclick="showGallery('PowerBI')" class="w-full md:w-64 bg-yellow-500/10 border border-yellow-500/20 p-10 rounded-[3rem] hover:scale-105 transition">
                        <div class="text-5xl mb-4">⚡</div><div class="font-bold text-xl text-yellow-500">POWER BI</div>
                    </button>
                </div>
            </div>

            <section id="admin-panel" class="hidden max-w-2xl mx-auto p-8 rounded-[3rem] border-2 border-dashed border-blue-500/20 bg-blue-500/5 space-y-4">
                <h3 class="text-blue-400 font-bold uppercase tracking-widest text-sm flex justify-between">
                    🛠 Admin Upload
                    <span class="text-[10px] text-slate-400 normal-case tracking-normal">Izohlarni ko'rish uchun Sheets'dagi 'Votes' varag'iga kiring.</span>
                </h3>
                <div class="grid grid-cols-2 gap-4">
                    <select id="new-cat" class="bg-slate-900 p-3 rounded-2xl border border-slate-700 outline-none text-sm"><option value="Excel">Excel</option><option value="PowerBI">Power BI</option></select>
                    <input type="text" id="new-eid" placeholder="ID (ex: 001)" class="bg-slate-900 p-3 rounded-2xl border border-slate-700 outline-none text-sm">
                </div>
                <input type="text" id="new-title" placeholder="Loyiha nomi / Talaba Ismi" class="w-full bg-slate-900 p-3 rounded-2xl border border-slate-700 outline-none">
                <textarea id="new-desc" placeholder="Loyiha tavsifi..." class="w-full bg-slate-900 p-3 rounded-2xl border border-slate-700 outline-none h-20"></textarea>
                <div class="grid grid-cols-2 gap-4">
                    <input type="url" id="new-pbi" placeholder="Power BI Public Link (ixtiyoriy)" class="w-full bg-slate-900 p-3 rounded-2xl border border-slate-700 outline-none text-sm">
                    <input type="number" id="new-owner" placeholder="Egasi Telegram ID'si (Owner ID)" class="w-full bg-slate-900 p-3 rounded-2xl border border-slate-700 outline-none text-sm border-amber-500/50">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1"><label class="text-[10px] text-slate-500">MAIN PHOTO*</label><input type="file" id="new-img" accept="image/*" class="text-xs bg-slate-900 p-2 rounded-2xl w-full border border-slate-700"></div>
                    <div class="space-y-1"><label class="text-[10px] text-slate-500">EXCEL FILE</label><input type="file" id="new-excel" class="text-xs bg-slate-900 p-2 rounded-2xl w-full border border-slate-700"></div>
                </div>
                <div class="grid grid-cols-2 lg:grid-cols-4 gap-2">
                    <input type="file" id="new-ex1" accept="image/*" class="text-[10px] bg-slate-900 p-2 rounded-xl w-full">
                    <input type="file" id="new-ex2" accept="image/*" class="text-[10px] bg-slate-900 p-2 rounded-xl w-full">
                    <input type="file" id="new-ex3" accept="image/*" class="text-[10px] bg-slate-900 p-2 rounded-xl w-full">
                    <input type="file" id="new-ex4" accept="image/*" class="text-[10px] bg-slate-900 p-2 rounded-xl w-full">
                </div>
                <button onclick="uploadEntry()" id="up-btn" class="w-full bg-blue-600 py-4 rounded-2xl font-black shadow-lg hover:bg-blue-500 mt-4">🚀 PUBLISH</button>
            </section>
        </div>

        <div id="gallery-view" class="hidden space-y-10 pb-32">
            <div class="flex justify-between items-center">
                <button onclick="showHome()" class="bg-slate-800 px-6 py-2 rounded-xl text-sm font-bold border border-slate-700">← Orqaga</button>
                <h2 id="category-title" class="text-2xl font-black text-white uppercase italic"></h2>
            </div>
            
            <div id="category-leaderboard" class="bg-slate-900/60 p-6 rounded-[2rem] border border-slate-800 shadow-xl overflow-x-auto custom-scroll">
                <h3 class="text-[10px] text-blue-400 font-bold tracking-[0.2em] uppercase mb-4 pl-2">🏆 TOP Reyting</h3>
                <div id="leaderboard-content" class="flex flex-col md:flex-row gap-4 min-w-max pb-2"></div>
            </div>

            <div id="gallery-container" class="space-y-24"></div>
        </div>
    </main>

    <div id="lightbox" class="hidden fixed inset-0 z-[9999] bg-black/95 flex items-center justify-center select-none" onclick="if(event.target.id === 'lightbox') closeLightbox()">
        <button onclick="closeLightbox()" class="absolute top-6 right-8 text-white text-5xl font-light hover:text-red-500 transition z-50">&times;</button>
        <button onclick="prevLightboxSlide()" class="absolute left-2 md:left-10 text-white text-4xl md:text-5xl bg-black/40 hover:bg-black/80 w-14 h-14 md:w-20 md:h-20 rounded-full flex items-center justify-center transition z-50 pb-1">❮</button>
        <img id="lightbox-img" src="" class="max-w-[90%] max-h-[90vh] object-contain rounded-xl shadow-2xl transition-transform duration-300">
        <button onclick="nextLightboxSlide()" class="absolute right-2 md:right-10 text-white text-4xl md:text-5xl bg-black/40 hover:bg-black/80 w-14 h-14 md:w-20 md:h-20 rounded-full flex items-center justify-center transition z-50 pb-1">❯</button>
    </div>

    <script>
        const ADMIN_ID = 8408175512; 
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzlZ1lCQ7sGMOIlytpZ78MfnBLh1Uq3ksJSuoZ6tmJJsyIvxkXq_8vpBLNoLQcsTajM/exec'; // 👈 URL SHU YERGA
        
        const DEADLINE = new Date('2026-04-04T18:00:00+05:00').getTime();
        
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        let userId = null;
        let userName = 'Foydalanuvchi';
        
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            userId = tg.initDataUnsafe.user.id;
            const first = tg.initDataUnsafe.user.first_name || '';
            const last = tg.initDataUnsafe.user.last_name || '';
            userName = `${first} ${last}`.trim() || 'Foydalanuvchi';
        } else {
            userId = new URLSearchParams(window.location.search).get('id');
            userName = 'Kuzatuvchi (Brauzer)';
        }

        let allEntries = [];
        let leaderboardData = [];
        let myVotes = []; 
        let isDataLoaded = false;
        
        window.entryImages = {};
        window.currentSlide = {};
        let activeLightboxEid = null;

        const excelIcon = `<svg class="w-6 h-6 ml-1 mt-1" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M14 2H6C4.89543 2 4 2.89543 4 4V20C4 21.1046 4.89543 22 6 22H18C19.1046 22 20 21.1046 20 20V8L14 2Z" fill="#10b981"/><path d="M14 2V8H20" fill="#047857"/><path d="M9.5 16.5L12 13M12 13L14.5 9.5M12 13L9.5 9.5M12 13L14.5 16.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
        const pbiIcon = `<svg class="w-6 h-6 ml-1" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="14" y="4" width="6" height="16" rx="1" fill="#eab308"/><rect x="4" y="12" width="6" height="8" rx="1" fill="#ca8a04"/><rect x="9" y="8" width="6" height="12" rx="1" fill="#facc15"/></svg>`;

        document.addEventListener('DOMContentLoaded', () => {
            if(userId) document.getElementById('user-display').innerText = `${userName} (${userId})`;
            if(parseInt(userId) === ADMIN_ID) document.getElementById('admin-panel').classList.remove('hidden');
            
            const isTimeout = new Date().getTime() > DEADLINE;
            if(!isTimeout) document.getElementById('deadline-timer').classList.remove('hidden');
            
            fetchData();
        });

        async function fetchData() {
            try {
                const urlWithParams = userId ? `${WEB_APP_URL}?userId=${userId}` : WEB_APP_URL;
                const res = await fetch(urlWithParams);
                const data = await res.json();
                
                allEntries = data.entries || [];
                leaderboardData = data.leaderboard || [];
                myVotes = data.userVotes || []; 
                
                isDataLoaded = true;
                document.getElementById('loading-indicator').innerText = "Tizim tayyor! Yo'nalishni tanlang 👇";
                document.getElementById('loading-indicator').classList.remove('animate-pulse');
                document.getElementById('loading-indicator').classList.add('text-emerald-400');
            } catch (e) { 
                document.getElementById('loading-indicator').innerText = "Ma'lumot yuklashda xato yuz berdi :(";
            }
        }

        function showHome() {
            document.getElementById('home-view').classList.remove('hidden');
            document.getElementById('gallery-view').classList.add('hidden');
        }

        function shuffleArray(array) {
            let curId = array.length;
            while (0 !== curId) {
                let randId = Math.floor(Math.random() * curId);
                curId -= 1;
                let tmp = array[curId];
                array[curId] = array[randId];
                array[randId] = tmp;
            }
            return array;
        }

        function getStarsHtml(score) {
            let stars = '';
            for(let i=1; i<=10; i++) {
                stars += `<span style="color: ${i <= Math.round(score) ? '#fbbf24' : '#334155'}; text-shadow: ${i <= Math.round(score) ? '0 0 5px rgba(251,191,36,0.5)' : 'none'}">★</span>`;
            }
            return stars;
        }

        function openExternalLink(url) {
            if (!url) return;
            if (window.Telegram && window.Telegram.WebApp && tg.initDataUnsafe.user) tg.openLink(url);
            else window.open(url, '_blank');
        }

        function forceDownload(url) {
            if (!url) return;
            let dlUrl = url;
            if (url.includes('/file/d/')) {
                const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
                if (match) dlUrl = `https://drive.google.com/uc?export=download&id=${match[1]}`;
            }
            const a = document.createElement('a'); a.href = dlUrl; a.target = '_blank'; a.download = '';
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
        }

        function openLightbox(eid) { activeLightboxEid = eid; updateLightboxImage(); document.getElementById('lightbox').classList.remove('hidden'); }
        function closeLightbox() { document.getElementById('lightbox').classList.add('hidden'); activeLightboxEid = null; document.getElementById('lightbox-img').src = ''; }
        function updateLightboxImage() { if (!activeLightboxEid) return; document.getElementById('lightbox-img').src = window.entryImages[activeLightboxEid][window.currentSlide[activeLightboxEid]]; }
        function prevLightboxSlide() { if (!activeLightboxEid) return; prevSlide(activeLightboxEid); updateLightboxImage(); }
        function nextLightboxSlide() { if (!activeLightboxEid) return; nextSlide(activeLightboxEid); updateLightboxImage(); }

        function updateSlide(eid) { document.getElementById(`main-img-${eid}`).src = window.entryImages[eid][window.currentSlide[eid]]; }
        function prevSlide(eid) { window.currentSlide[eid] = (window.currentSlide[eid] - 1 + window.entryImages[eid].length) % window.entryImages[eid].length; updateSlide(eid); }
        function nextSlide(eid) { window.currentSlide[eid] = (window.currentSlide[eid] + 1) % window.entryImages[eid].length; updateSlide(eid); }

        function showGallery(cat) {
            if(!isDataLoaded) return alert("Iltimos, ma'lumotlar yuklanishini kuting!");
            
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('gallery-view').classList.remove('hidden');
            document.getElementById('category-title').innerText = cat;
            
            let filtered = allEntries.filter(e => e.category === cat);
            const scoredIds = myVotes.filter(v => v.category === cat).map(v => String(v.entryId));
            
            let unscored = filtered.filter(item => !scoredIds.includes(String(item.entryid)));
            let scored = filtered.filter(item => scoredIds.includes(String(item.entryid)));
            
            const finalList = [...shuffleArray(unscored), ...shuffleArray(scored)];
            
            renderLeaderboard(cat);
            renderGallery(finalList, cat);
        }

        function renderLeaderboard(cat) {
            const container = document.getElementById('leaderboard-content');
            const catEntryIds = allEntries.filter(e => e.category === cat).map(e => String(e.entryid));
            const catLeaderboard = leaderboardData.filter(l => catEntryIds.includes(String(l.id))).sort((a,b) => b.avg - a.avg);

            container.innerHTML = catLeaderboard.map((s, index) => {
                const entryData = allEntries.find(e => String(e.entryid) === String(s.id));
                const qScores = cat === 'PowerBI' ? `(${s.q1}, ${s.q2}, ${s.q3}, ${s.q4})` : `(${s.q1}, ${s.q2}, ${s.q3})`;

                return `
                <div onclick="document.getElementById('dash-${s.id}').scrollIntoView({behavior: 'smooth', block: 'start'})" 
                     class="flex items-center gap-4 bg-slate-800 hover:bg-slate-700 transition px-5 py-3 rounded-2xl border border-slate-700 cursor-pointer min-w-[320px] max-w-md">
                    <span class="text-xl text-blue-400 font-black">#${index+1}</span>
                    <img src="${entryData ? entryData.fileurl : ''}" class="w-16 h-12 object-cover rounded-lg border border-slate-600 bg-slate-900" loading="lazy">
                    <div class="flex-1 min-w-0">
                        <div class="text-sm font-bold text-white truncate">${s.id} - ${s.title}</div>
                        <div class="flex items-center gap-1 mt-0.5 text-sm tracking-widest">${getStarsHtml(s.avg)}</div>
                        <div class="text-[10px] text-slate-400 font-mono mt-0.5">${s.avg}/10 &nbsp; ${qScores} &nbsp; • &nbsp; ${s.count} ta ovoz</div>
                    </div>
                </div>`;
            }).join('') || '<p class="text-slate-500 text-xs italic">Natijalar tez kunda...</p>';
        }

        function renderGallery(entries, cat) {
            const container = document.getElementById('gallery-container');
            container.innerHTML = entries.length ? '' : '<p class="text-center text-slate-500 py-10">Hozircha dashbordlar yo\'q.</p>';
            
            const isTimeout = new Date().getTime() > DEADLINE;

            entries.forEach(item => {
                const scoreObj = leaderboardData.find(l => String(l.id) === String(item.entryid));
                const avgScore = scoreObj ? parseFloat(scoreObj.avg) : 0;
                const voteCount = scoreObj ? scoreObj.count : 0; 
                
                const myVote = myVotes.find(v => String(v.entryId) === String(item.entryid));
                const isVoted = !!myVote;
                const isOwner = item.ownerid && String(item.ownerid).trim() === String(userId).trim();

                const images = [item.fileurl, item.extra1, item.extra2, item.extra3, item.extra4].filter(Boolean);
                window.entryImages[item.entryid] = images;
                window.currentSlide[item.entryid] = 0;

                const sliderControls = images.length > 1 ? `
                    <button onclick="prevSlide('${item.entryid}')" class="absolute left-2 top-1/2 -translate-y-1/2 bg-black/60 text-white w-10 h-10 flex items-center justify-center rounded-full opacity-0 group-hover:opacity-100 transition hover:bg-black/80">❮</button>
                    <button onclick="nextSlide('${item.entryid}')" class="absolute right-2 top-1/2 -translate-y-1/2 bg-black/60 text-white w-10 h-10 flex items-center justify-center rounded-full opacity-0 group-hover:opacity-100 transition hover:bg-black/80">❯</button>
                    <div class="absolute top-2 right-2 bg-black/70 px-3 py-1 rounded-full text-[10px] font-bold text-white tracking-widest">+${images.length - 1} rasm</div>
                ` : '';

                let dlLink = item.excelurl;
                if(dlLink && dlLink.includes('file/d/')) {
                    const fileId = dlLink.split('file/d/')[1].split('/')[0];
                    dlLink = `https://drive.google.com/uc?export=download&id=${fileId}`;
                }
                const iconSvg = cat === 'Excel' ? excelIcon : pbiIcon;
                const hasPbiLink = item.pbilink && item.pbilink.trim() !== '';
                const liveBtn = hasPbiLink ? `<button onclick="openExternalLink('${item.pbilink}')" class="shrink-0 w-16 h-16 md:w-20 md:h-20 bg-blue-600/20 text-blue-400 flex items-center justify-center diamond-shape border-2 border-blue-500 transition hover:scale-110 hover:bg-blue-600/40 shadow-xl" title="Jonli Dashboardni ko'rish">🌐</button>` : '';

                let rightPanelContent = '';
                
                if (isTimeout) {
                    rightPanelContent = `
                        <div class="flex flex-col items-center justify-center h-full space-y-6 text-center">
                            <div class="text-6xl opacity-80">🏁</div>
                            <div>
                                <h3 class="text-2xl font-black text-red-400 uppercase tracking-widest">OVOZ BERISH YAKUNLANGAN</h3>
                                <p class="text-slate-400 mt-2">Musobaqa o'z nihoyasiga yetdi. Barchaga ishtirok uchun rahmat!</p>
                            </div>
                        </div>
                    `;
                } else if (isOwner) {
                    rightPanelContent = `
                        <div class="flex flex-col items-center justify-center h-full space-y-6 text-center">
                            <div class="text-6xl opacity-80">🛡️</div>
                            <div>
                                <h3 class="text-2xl font-black text-blue-400 uppercase tracking-widest">Bu sizning ishingiz!</h3>
                                <p class="text-slate-400 mt-2">O'zingizning dashbordingizga ovoz bera olmaysiz. Raqobatchilarning ishini xolis baholang.</p>
                            </div>
                        </div>
                    `;
                } else {
                    rightPanelContent = `
                        <h4 class="text-sm font-bold ${isVoted ? 'text-emerald-400' : 'text-blue-400'} uppercase tracking-widest mb-2 border-b border-slate-700 pb-3">
                            ${isVoted ? '✅ SIZNING OVOZINGIZ' : 'Ovoz Berish Paneli'}
                        </h4>
                        
                        <div class="space-y-6">
                            ${qBox(item.entryid, 'q1', "Dashboard dizayniga (chartlar, ranglar, shakllar, textlar) qanday baho berasiz?", myVote ? myVote.q1 : 0, isVoted)}
                            ${qBox(item.entryid, 'q2', "Dashboard ortiqcha so'zlarsiz tushunarliligiga qanday baho berasiz?", myVote ? myVote.q2 : 0, isVoted)}
                            ${qBox(item.entryid, 'q3', "Dashboarddagi ma'lumotlari biznes uchun qaror chiqarishga qanchalik muhim deb o'ylaysiz?", myVote ? myVote.q3 : 0, isVoted)}
                            ${cat === 'PowerBI' ? qBox(item.entryid, 'q4', "Power BI DAX dan qo'llanish darajasini qanday baholaysiz?", myVote ? myVote.q4 : 0, isVoted) : ''}
                        </div>

                        <div class="space-y-2 mt-6">
                            <h4 class="text-[10px] font-bold text-amber-500 uppercase tracking-widest px-2">IZOH (MAJBURIY, MIN 20 TA BELGI)</h4>
                            <textarea id="advice-${item.entryid}" class="w-full ${isVoted ? 'bg-slate-800/40 text-slate-400' : 'bg-slate-900 text-slate-200'} border border-slate-700 p-4 rounded-3xl outline-none text-sm h-24 focus:border-amber-500 transition resize-none" placeholder="Ishtirokchiga maslahat va fikrlaringizni yozing..." ${isVoted ? 'readonly' : ''}>${myVote ? (myVote.advice || '') : ''}</textarea>
                        </div>

                        ${!isVoted ? 
                            `<button onclick="submitVote('${item.entryid}', '${cat}')" class="w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-[2rem] font-black text-lg transition-all shadow-xl shadow-blue-600/20 mt-4 tracking-wider">TASDIQLASH VA OVOZ BERISH</button>` 
                            : 
                            `<div class="w-full bg-emerald-600/20 text-emerald-500 py-5 rounded-[2rem] font-black text-center text-lg mt-4 border border-emerald-500/30 cursor-not-allowed tracking-wider">OVOZ BERILGAN</div>`
                        }
                    `;
                }

                const styleBorder = isTimeout ? 'border-red-900/50 bg-red-900/5' : isVoted ? 'border-emerald-500/50 bg-emerald-900/10' : isOwner ? 'border-blue-500/30 bg-blue-900/5' : 'border-slate-800 bg-slate-900/40';

                container.innerHTML += `
                <div id="dash-${item.entryid}" class="grid grid-cols-1 xl:grid-cols-12 gap-8 p-6 md:p-10 rounded-[3rem] border shadow-2xl relative ${styleBorder}">
                    <div class="xl:col-span-6 space-y-6 min-w-0 flex flex-col">
                        <div class="relative w-full h-[300px] md:h-[450px] bg-slate-800 rounded-[2rem] overflow-hidden border border-slate-700 group flex items-center justify-center shadow-lg">
                            <img id="main-img-${item.entryid}" src="${images[0]}" class="max-w-full max-h-full object-contain cursor-zoom-in transition duration-300 hover:scale-[1.02]" onclick="openLightbox('${item.entryid}')" loading="lazy">
                            ${sliderControls}
                        </div>

                        <div class="mt-4 flex flex-col sm:flex-row items-start sm:items-center justify-between border-t border-slate-800 pt-6 gap-4">
                            <div class="min-w-0">
                                <div class="inline-block ${isTimeout ? 'bg-red-600' : isVoted ? 'bg-emerald-600' : isOwner ? 'bg-amber-600' : 'bg-blue-600'} text-[10px] font-black px-3 py-1 rounded-full mb-2 uppercase tracking-widest">${item.entryid}</div>
                                <h3 class="text-3xl font-black text-white italic leading-tight break-words">${item.title || 'Nomsiz Dashboard'}</h3>
                                <div class="flex items-center gap-2 mt-3 text-2xl tracking-widest flex-wrap">
                                    ${getStarsHtml(avgScore)} 
                                    <span class="text-xs text-slate-400 font-bold ml-2 font-mono whitespace-nowrap">${avgScore.toFixed(1)}/10 O'rtacha &nbsp;•&nbsp; ${voteCount} ta ovoz</span>
                                </div>
                            </div>
                            
                            <div class="flex gap-2">
                                ${liveBtn}
                                ${dlLink ? `<button onclick="forceDownload('${dlLink}')" class="shrink-0 w-16 h-16 md:w-20 md:h-20 bg-slate-800 flex items-center justify-center diamond-shape border-2 border-slate-600 transition hover:scale-110 hover:border-${cat === 'Excel' ? 'emerald' : 'yellow'}-500 hover:bg-slate-700 shadow-xl" title="Faylni yuklab olish">${iconSvg}</button>` : ''}
                            </div>
                        </div>

                        <div class="bg-slate-800/40 p-6 rounded-3xl border border-slate-700/50 mt-4 grow">
                            <h4 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">TAVSIF</h4>
                            <p class="text-sm md:text-base text-slate-300 leading-relaxed break-words whitespace-pre-wrap">${item.description || 'Tavsif berilmagan.'}</p>
                        </div>
                    </div>

                    <div class="xl:col-span-6 space-y-6 min-w-0 flex flex-col justify-center bg-slate-800/20 p-6 md:p-8 rounded-[2rem] border border-slate-700/50">
                        ${rightPanelContent}
                    </div>
                </div>`;
            });
        }

        function qBox(id, qk, txt, myVal, isVoted) {
            let stars = `<div class="star-rating mt-2" id="stars-${id}-${qk}">`;
            for(let i=1; i<=10; i++) {
                const activeClass = i <= myVal ? 'active' : '';
                const onClick = isVoted ? '' : `onclick="setS('${id}','${qk}',${i})"`;
                const cursor = isVoted ? 'cursor-default' : 'cursor-pointer';
                stars += `<span class="star ${activeClass} ${cursor}" ${onClick}>★</span>`;
            }
            stars += `</div><input type="hidden" id="val-${id}-${qk}" value="${myVal}">`;
            return `<div class="space-y-1"><p class="text-sm md:text-base text-slate-200 font-bold uppercase ml-1 tracking-wide break-words leading-relaxed">${txt}</p>${stars}</div>`;
        }

        function setS(id, qk, v) {
            const stars = document.getElementById(`stars-${id}-${qk}`).getElementsByClassName('star');
            document.getElementById(`val-${id}-${qk}`).value = v;
            for(let i=0; i<10; i++) stars[i].classList.toggle('active', i < v);
        }

        async function submitVote(id, cat) {
            if(!userId) return alert("Iltimos, bot orqali kiring!");
            
            const q1=document.getElementById(`val-${id}-q1`).value, q2=document.getElementById(`val-${id}-q2`).value, q3=document.getElementById(`val-${id}-q3`).value, q4=cat==='PowerBI'?document.getElementById(`val-${id}-q4`).value:0;
            const advice = document.getElementById(`advice-${id}`).value.trim();
            
            if(q1==0||q2==0||q3==0 || (cat==='PowerBI' && q4==0)) return alert("Barcha yulduzchalarga baho bering!");
            if(advice.length < 20) return alert(`Izoh juda qisqa! Kamida 20 ta belgi yozing. (Hozir: ${advice.length} ta)`);
            if(new Date().getTime() > DEADLINE) return alert("Kechirasiz, ovoz berish vaqti tugagan!");

            if(confirm(`ID #${id} ga bergan ovozingizni tasdiqlaysizmi?`)) {
                const res = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({action:'vote', voterId:userId, voterName:userName, entryId:id, q1, q2, q3, q4, advice, category:cat}) });
                const result = await res.json();
                
                if (result.status === 'timeout') alert("Kechirasiz, ovoz berish vaqti tugagan!");
                else if (result.status === 'not_whitelisted') alert("Siz ovoz berish huquqiga ega emassiz (Oq ro'yxatda yo'qsiz).");
                else if (result.status === 'own_dashboard') alert("Siz o'z ishingizga ovoz bera olmaysiz!");
                else if (result.status === 'duplicate') alert("Siz ushbu dashboardga allaqachon ovoz bergansiz!");
                else { alert("Rahmat! Ovozingiz qabul qilindi."); location.reload(); }
            }
        }
    </script>
</body>
</html>
